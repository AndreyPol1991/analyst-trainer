<title>Бюро анализа на Бейкер-стрит — Этапы разработки ПО</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#ECEFF4; --surface:#FBFCFE; --surface2:#F0F3F8; --ink:#1B2433; --muted:#5C6880;
  --line:#D7DEE9; --accent:#B07818; --accent-ink:#8A5D10; --accent-soft:#F6E9CC;
  --teal:#12897B; --teal-soft:#DCF1ED; --good:#218A54; --good-soft:#DFF2E6;
  --bad:#C24040; --bad-soft:#F8E0E0; --shadow:0 1px 3px rgba(20,30,50,.08),0 8px 24px rgba(20,30,50,.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0F141D; --surface:#171E2B; --surface2:#1E2735; --ink:#E9EDF4; --muted:#94A0B4;
    --line:#2B3648; --accent:#E5B45B; --accent-ink:#F0C77E; --accent-soft:#2E2614;
    --teal:#4FC6B0; --teal-soft:#143029; --good:#58C98A; --good-soft:#15301F;
    --bad:#E76F6F; --bad-soft:#3A1C1C; --shadow:0 1px 3px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  --bg:#0F141D; --surface:#171E2B; --surface2:#1E2735; --ink:#E9EDF4; --muted:#94A0B4;
  --line:#2B3648; --accent:#E5B45B; --accent-ink:#F0C77E; --accent-soft:#2E2614;
  --teal:#4FC6B0; --teal-soft:#143029; --good:#58C98A; --good-soft:#15301F;
  --bad:#E76F6F; --bad-soft:#3A1C1C; --shadow:0 1px 3px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#ECEFF4; --surface:#FBFCFE; --surface2:#F0F3F8; --ink:#1B2433; --muted:#5C6880;
  --line:#D7DEE9; --accent:#B07818; --accent-ink:#8A5D10; --accent-soft:#F6E9CC;
  --teal:#12897B; --teal-soft:#DCF1ED; --good:#218A54; --good-soft:#DFF2E6;
  --bad:#C24040; --bad-soft:#F8E0E0; --shadow:0 1px 3px rgba(20,30,50,.08),0 8px 24px rgba(20,30,50,.06);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:Georgia,"Times New Roman","Noto Serif",serif;
  font-size:16px; line-height:1.55; min-height:100vh;
}
.hero h1,.miss-head h2,.res h2{font-family:Georgia,"Times New Roman",serif}
.mono{font-family:Consolas,"Cascadia Code","SF Mono",Menlo,monospace; font-variant-numeric:tabular-nums}
button{font:inherit; color:inherit; cursor:pointer; border:none; background:none}
button:focus-visible,a:focus-visible,summary:focus-visible{outline:2px solid var(--teal); outline-offset:2px; border-radius:6px}
.wrap{max-width:880px; margin:0 auto; padding:0 20px 64px}

/* ---------- HUD ---------- */
.hud{
  position:sticky; top:0; z-index:10; background:var(--surface);
  border-bottom:1px solid var(--line);
}
.hud-in{max-width:880px; margin:0 auto; padding:10px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.hud-brand{font-weight:800; letter-spacing:-.01em; margin-right:auto; display:flex; align-items:baseline; gap:10px}
.hud-brand .sub{font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.08em}
.stat{display:flex; flex-direction:column; align-items:flex-end; gap:0}
.stat b{font-family:Consolas,Menlo,monospace; font-size:17px; line-height:1.2; color:var(--accent)}
.stat span{font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted)}
.stat.rank b{color:var(--teal); font-size:14px; font-family:inherit; font-weight:700}

/* ---------- Hub ---------- */
.hero{padding:44px 0 10px; display:grid; grid-template-columns:1fr 225px; gap:36px; align-items:center}
.hero-art{display:flex; flex-direction:column; gap:8px}
.hero-art img{width:100%; border-radius:10px; border:1px solid var(--line); box-shadow:var(--shadow); filter:saturate(.92)}
.hero-art span{font-size:11.5px; color:var(--muted); text-align:center; line-height:1.4}
@media (max-width:680px){.hero{grid-template-columns:1fr}.hero-art{max-width:210px}}
.res-art{width:210px; max-width:70%; border-radius:10px; border:1px solid var(--line); margin:16px auto 2px; display:block; filter:saturate(.92)}
.intro-art{float:right; width:180px; margin:6px 0 12px 20px; border-radius:10px; border:1px solid var(--line); filter:saturate(.92)}
@media (max-width:560px){.intro-art{float:none; display:block; margin:0 auto 14px}}
.hero .kicker{font-size:12px; text-transform:uppercase; letter-spacing:.14em; color:var(--teal); font-weight:700}
.hero h1{font-size:clamp(28px,5vw,42px); font-weight:800; letter-spacing:-.02em; line-height:1.12; margin:8px 0 12px; text-wrap:balance}
.hero p{max-width:60ch; color:var(--muted); margin:0 0 6px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; margin-top:26px}
.mcard{
  text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:14px;
  padding:18px 18px 16px; display:flex; flex-direction:column; gap:10px;
  box-shadow:var(--shadow); transition:transform .12s ease, border-color .12s ease;
}
.mcard:hover{transform:translateY(-2px); border-color:var(--teal)}
.mcard .idx{font-family:Consolas,Menlo,monospace; font-size:13px; color:var(--accent); letter-spacing:.05em}
.mcard .idx .fin{color:var(--teal)}
.mcard h3{margin:0; font-size:17px; font-weight:750; letter-spacing:-.01em; line-height:1.25}
.mcard .meta{font-size:13px; color:var(--muted)}
.mcard .bar{height:5px; border-radius:3px; background:var(--surface2); overflow:hidden; margin-top:auto}
.mcard .bar i{display:block; height:100%; background:var(--teal); border-radius:3px}
.mcard .stars{color:var(--accent); font-size:14px; letter-spacing:2px}
.mcard .stars .off{color:var(--line)}
.hub-foot{margin-top:34px; display:flex; gap:14px; align-items:center; flex-wrap:wrap}
.hub-foot .note{font-size:13px; color:var(--muted); margin-right:auto; max-width:52ch}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:8px; padding:11px 22px; border-radius:10px;
  font-weight:700; font-size:15px; border:1px solid transparent; transition:filter .1s ease;
}
.btn:hover{filter:brightness(1.06)}
.btn-primary{background:var(--accent); color:var(--bg)}
:root[data-theme="light"] .btn-primary{color:#fff}
@media (prefers-color-scheme: light){ :root:not([data-theme]) .btn-primary{color:#fff} }
.btn-ghost{border-color:var(--line); color:var(--muted); background:var(--surface)}
.btn-ghost:hover{color:var(--ink)}
.btn[disabled]{opacity:.45; cursor:not-allowed; filter:none}

/* ---------- Mission ---------- */
.miss-head{padding:30px 0 4px}
.crumb{font-size:13px; color:var(--muted)}
.crumb button{color:var(--teal); font-weight:600; padding:0}
.miss-head h2{font-size:clamp(22px,4vw,30px); font-weight:800; letter-spacing:-.015em; margin:6px 0 4px; text-wrap:balance}
.miss-head .desc{color:var(--muted); max-width:62ch; margin:0}
.theory{margin:18px 0 0; background:var(--surface); border:1px solid var(--line); border-radius:12px}
.theory summary{padding:13px 18px; font-weight:700; cursor:pointer; list-style:none; display:flex; align-items:center; gap:10px}
.theory summary::before{content:"▸"; color:var(--teal); transition:transform .15s}
.theory[open] summary::before{transform:rotate(90deg)}
.theory ul{margin:0; padding:2px 22px 16px 34px; color:var(--ink)}
.theory li{margin:7px 0; max-width:65ch}
.theory li::marker{color:var(--teal)}
.start-row{margin:22px 0 0; display:flex; gap:12px; align-items:center}

/* ---------- Task ---------- */
.task-top{display:flex; align-items:center; gap:14px; margin:26px 0 12px}
.task-top .count{font-family:Consolas,Menlo,monospace; font-size:13px; color:var(--muted); white-space:nowrap}
.task-top .bar{flex:1; height:6px; background:var(--surface2); border:1px solid var(--line); border-radius:4px; overflow:hidden}
.task-top .bar i{display:block; height:100%; background:var(--accent); transition:width .25s ease}
.task-top .streak{font-family:Consolas,Menlo,monospace; font-size:13px; color:var(--accent); white-space:nowrap}
.tcard{
  background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:24px;
  box-shadow:var(--shadow); position:relative; animation:rise .25s ease;
}
.tcard.ok{border-color:var(--good)}
.tcard.err{border-color:var(--bad)}
.ttype{font-size:11px; text-transform:uppercase; letter-spacing:.11em; color:var(--teal); font-weight:700; margin-bottom:10px}
.tq{font-size:18px; font-weight:650; line-height:1.45; margin:0 0 18px; max-width:64ch; white-space:pre-line}
.opts{display:flex; flex-direction:column; gap:9px}
.opt{
  text-align:left; padding:12px 16px; border:1px solid var(--line); border-radius:10px;
  background:var(--surface2); line-height:1.45; transition:border-color .1s;
}
.opt:hover{border-color:var(--teal)}
.opt.sel-ok{border-color:var(--good); background:var(--good-soft)}
.opt.sel-bad{border-color:var(--bad); background:var(--bad-soft)}
.opt.reveal{border-color:var(--good); background:var(--good-soft)}
.opt[disabled]{cursor:default}
.opt[disabled]:hover{border-color:var(--line)}
.opt.reveal[disabled]:hover,.opt.sel-ok[disabled]:hover{border-color:var(--good)}
.opt.sel-bad[disabled]:hover{border-color:var(--bad)}

.chips{display:flex; flex-wrap:wrap; gap:8px}
.chip{
  padding:8px 14px; border:1px solid var(--line); border-radius:999px; background:var(--surface2);
  font-size:14.5px; transition:border-color .1s;
}
.chip:hover{border-color:var(--teal)}
.chip.used{opacity:.28; pointer-events:none}
.zone-label{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:700; margin:16px 0 8px}
.seq{display:flex; flex-direction:column; gap:7px; margin-bottom:6px}
.seq .slot{
  display:flex; align-items:center; gap:10px; padding:9px 14px; border:1px dashed var(--line);
  border-radius:10px; min-height:42px; font-size:14.5px; background:var(--surface);
}
.seq .slot .n{font-family:Consolas,Menlo,monospace; font-size:12px; color:var(--accent); width:20px}
.seq .slot.filled{border-style:solid; background:var(--surface2); cursor:pointer}
.seq .slot.ok{border-color:var(--good); background:var(--good-soft)}
.seq .slot.bad{border-color:var(--bad); background:var(--bad-soft)}
.seq .slot .fix{margin-left:auto; font-size:12.5px; color:var(--muted)}

.pairs{display:flex; flex-direction:column; gap:8px; margin-bottom:14px}
.pairline{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.pbtn{
  text-align:left; padding:10px 13px; border:1px solid var(--line); border-radius:10px;
  background:var(--surface2); font-size:14px; line-height:1.4; transition:border-color .1s;
}
.pbtn:hover{border-color:var(--teal)}
.pbtn.active{border-color:var(--accent); background:var(--accent-soft)}
.pbtn.linked{border-color:var(--teal)}
.pbtn.ok{border-color:var(--good); background:var(--good-soft)}
.pbtn.bad{border-color:var(--bad); background:var(--bad-soft)}
.pbtn .tag{display:inline-block; font-family:Consolas,Menlo,monospace; font-size:11px; color:var(--teal); margin-right:7px}

.sort-item{
  background:var(--surface2); border:1px solid var(--line); border-radius:12px; padding:20px;
  font-size:17px; font-weight:600; text-align:center; margin-bottom:14px; line-height:1.45;
}
.sort-item.ok{border-color:var(--good); background:var(--good-soft)}
.sort-item.bad{border-color:var(--bad); background:var(--bad-soft)}
.bucket-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center}
.bucket{
  flex:1; min-width:150px; padding:13px 16px; border:1.5px solid var(--line); border-radius:11px;
  background:var(--surface); font-weight:700; font-size:15px; transition:border-color .1s;
}
.bucket:hover{border-color:var(--teal)}
.sort-note{text-align:center; font-size:13px; color:var(--muted); margin-top:10px}

.build-sent{display:flex; flex-direction:column; gap:8px; margin-bottom:16px}
.bslot{display:flex; align-items:center; gap:10px}
.bslot .pre{font-weight:700; color:var(--teal); min-width:74px; text-align:right; font-size:15px}
.bslot .cell{
  flex:1; min-height:42px; border:1px dashed var(--line); border-radius:10px; padding:8px 13px;
  display:flex; align-items:center; font-size:14.5px; background:var(--surface);
}
.bslot .cell.filled{border-style:solid; background:var(--surface2); cursor:pointer}
.bslot .cell.ok{border-color:var(--good); background:var(--good-soft)}
.bslot .cell.bad{border-color:var(--bad); background:var(--bad-soft)}

.actions{margin-top:20px; display:flex; gap:12px; align-items:center}
.fb{margin-top:18px; border-radius:12px; padding:16px 18px; border:1px solid; font-size:15px}
.fb.good{background:var(--good-soft); border-color:var(--good)}
.fb.bad{background:var(--bad-soft); border-color:var(--bad)}
.fb .verdict{font-weight:800; letter-spacing:.02em; margin-bottom:6px; display:flex; align-items:center; gap:8px}
.fb.good .verdict{color:var(--good)}
.fb.bad .verdict{color:var(--bad)}
.fb .xp{margin-left:auto; font-family:Consolas,Menlo,monospace; font-size:14px; color:var(--accent)}
.fb p{margin:4px 0 0; max-width:64ch}
.fb .corr{margin-top:8px; font-size:14px; color:var(--muted)}

/* ---------- Results ---------- */
.res{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:32px; margin-top:28px; box-shadow:var(--shadow); text-align:center}
.res .big-stars{font-size:34px; letter-spacing:6px; color:var(--accent)}
.res .big-stars .off{color:var(--line)}
.res h2{margin:10px 0 4px; font-size:26px; font-weight:800; letter-spacing:-.015em}
.res .sub{color:var(--muted); margin:0}
.res .nums{display:flex; justify-content:center; gap:36px; margin:22px 0 4px; flex-wrap:wrap}
.res .nums div{display:flex; flex-direction:column}
.res .nums b{font-family:Consolas,Menlo,monospace; font-size:24px; color:var(--teal)}
.res .nums b.amber{color:var(--accent)}
.res .nums span{font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted)}
.res .actions{justify-content:center}
.mist{margin-top:22px; text-align:left}
.mist h3{font-size:15px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 10px}
.mist-item{border:1px solid var(--line); border-radius:11px; padding:13px 16px; margin-bottom:9px; background:var(--surface2); font-size:14px}
.mist-item .mq{font-weight:650; margin-bottom:5px}
.mist-item .ma{color:var(--good)}
.mist-item .me{color:var(--muted); margin-top:4px}

/* ---------- Иконки миссий ---------- */
.toprow{display:flex; justify-content:space-between; align-items:flex-start}
.mcard .micon{width:30px; height:30px; color:var(--teal); flex:none}

/* ---------- Диалог (чат) ---------- */
.chat{display:flex; flex-direction:column; gap:10px}
.msg{display:flex; gap:9px; align-items:flex-end; max-width:88%}
.msg .av{width:34px; height:34px; border-radius:50%; background:var(--teal-soft); color:var(--teal); display:flex; align-items:center; justify-content:center; font-weight:800; flex:none; font-size:14px}
.msg .bub{background:var(--surface2); border:1px solid var(--line); border-radius:14px 14px 14px 4px; padding:10px 14px; font-size:14.5px; line-height:1.45; animation:rise .2s ease}
.msg.me{align-self:flex-end; flex-direction:row-reverse}
.msg.me .bub{border-radius:14px 14px 4px 14px; background:var(--accent-soft); border-color:var(--accent)}
.msg.coach .bub{border-color:var(--teal); background:var(--teal-soft); border-radius:14px}
.dots{display:inline-flex; gap:4px; padding:4px 2px}
.dots i{width:6px; height:6px; border-radius:50%; background:var(--muted); animation:blink 1s infinite}
.dots i:nth-child(2){animation-delay:.2s}
.dots i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ---------- Документ (найди ошибку) ---------- */
.doc{border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--surface)}
.doc-head{padding:9px 16px; background:var(--surface2); border-bottom:1px solid var(--line); font-family:Consolas,Menlo,monospace; font-size:11.5px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase}
.doc .line{display:block; width:100%; text-align:left; padding:11px 16px; border-bottom:1px solid var(--line); font-size:14.5px; line-height:1.45; transition:background .1s}
.doc .line:last-child{border-bottom:none}
.doc .line:hover{background:var(--accent-soft)}
.doc .line.ok{background:var(--good-soft); box-shadow:inset 3px 0 0 var(--good)}
.doc .line.bad{background:var(--bad-soft); box-shadow:inset 3px 0 0 var(--bad)}
.doc .line[disabled]:hover{background:none}
.doc .line.ok[disabled]:hover{background:var(--good-soft)}
.doc .line.bad[disabled]:hover{background:var(--bad-soft)}

/* ---------- Блиц ---------- */
.tbar{height:8px; background:var(--surface2); border:1px solid var(--line); border-radius:5px; overflow:hidden; margin-bottom:18px}
.tbar i{display:block; height:100%; width:100%; background:var(--accent)}
.tf-row{display:flex; gap:12px}
.tf-row .btn{flex:1; justify-content:center; font-size:17px; padding:15px}

/* ---------- Анимации ---------- */
@keyframes rise{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}
.fly{position:absolute; right:26px; top:16px; font-family:Consolas,Menlo,monospace; font-weight:700; color:var(--accent); font-size:19px; animation:flyup 1.1s ease-out forwards; pointer-events:none}
@keyframes flyup{from{opacity:1; transform:translateY(0)}to{opacity:0; transform:translateY(-48px)}}
.task-top .streak{animation:pop .35s ease}
.lvlup{display:inline-block; margin:16px auto 0; padding:10px 22px; border:1px solid var(--accent); background:var(--accent-soft); border-radius:999px; font-weight:800; color:var(--accent-ink); animation:pop .45s ease}
@keyframes pop{from{transform:scale(.6); opacity:0}}
#confetti{position:fixed; inset:0; pointer-events:none; z-index:50}

/* ---------- Диаграммы ---------- */
.diagram{margin:4px 22px 18px; padding:16px; background:var(--surface2); border:1px solid var(--line); border-radius:12px; overflow-x:auto}
.diagram h4{margin:0 0 12px; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted)}
.flow{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.flow .fstep{padding:7px 12px; border:1px solid var(--teal); color:var(--teal); border-radius:9px; font-size:13px; font-weight:650; background:var(--surface); white-space:nowrap}
.flow .fstep.hot{border-color:var(--accent); color:var(--accent-ink); background:var(--accent-soft)}
.flow .farr{color:var(--muted); font-size:14px}
.loopback{margin-top:10px; font-size:12.5px; color:var(--muted); border-top:1px dashed var(--line); padding-top:8px}
.loopback b{color:var(--teal)}
.pyr{display:flex; flex-direction:column; align-items:center; gap:5px}
.pyr div{border:1px solid var(--teal); color:var(--ink); background:var(--surface); border-radius:8px; padding:6px 14px; font-size:13px; text-align:center}
.pyr div:nth-child(1){width:min(46%,240px); border-color:var(--accent); background:var(--accent-soft)}
.pyr div:nth-child(2){width:min(70%,380px)}
.pyr div:nth-child(3){width:min(94%,520px)}
.stairs{display:flex; flex-direction:column; gap:4px; min-width:300px}
.stairs div{border:1px solid var(--teal); background:var(--surface); border-radius:8px; padding:5px 12px; font-size:12.5px; width:150px; white-space:nowrap}
.stairs div:nth-child(2){margin-left:36px}
.stairs div:nth-child(3){margin-left:72px}
.stairs div:nth-child(4){margin-left:108px}
.stairs div:nth-child(5){margin-left:144px}
.dg2{display:grid; grid-template-columns:1fr 1fr; gap:18px}
@media (max-width:640px){.dg2{grid-template-columns:1fr}}
.kb{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; min-width:300px}
.kb .col{background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:8px}
.kb .col h5{margin:0 0 7px; font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); display:flex; justify-content:space-between}
.kb .col h5 .wip{color:var(--accent); font-family:Consolas,Menlo,monospace}
.kb .kcard{background:var(--surface2); border:1px solid var(--line); border-radius:6px; padding:5px 8px; font-size:12px; margin-bottom:5px}
.anat{display:flex; flex-direction:column; gap:6px; max-width:460px}
.anat div{border-radius:9px; padding:8px 13px; font-size:13.5px; border:1px solid}
.anat .a1{border-color:var(--teal); background:var(--teal-soft)}
.anat .a2{border-color:var(--accent); background:var(--accent-soft)}
.anat .a3{border-color:var(--good); background:var(--good-soft)}
.anat b{display:inline-block; min-width:64px}
.anat span{color:var(--muted); font-size:12px}

@media (max-width:560px){
  .pairline{grid-template-columns:1fr}

<script>
"use strict";
/* ============================== ДАННЫЕ ============================== */
const RANKS=[[0,"Посыльный с Бейкер-стрит"],[250,"Констебль анализа"],[500,"Инспектор требований"],[720,"Старший детектив-аналитик"],[900,"Шерлок системного анализа"]];
const M=[
{id:"lc",num:"01",title:"Жизненный цикл ПО",
 desc:"Стартап запускает приложение доставки еды «Ёж». Пройдите вместе с командой весь путь — от идеи до поддержки — и научитесь узнавать этапы жизненного цикла в реальных ситуациях.",
 theory:[
  "Жизненный цикл ПО — путь продукта: анализ требований → проектирование → разработка → тестирование → внедрение → сопровождение.",
  "Анализ требований — выясняем, ЧТО должна делать система и зачем. Проектирование — решаем, КАК она будет устроена.",
  "Тестирование — проверка соответствия требованиям и поиск дефектов до того, как их найдут пользователи.",
  "Внедрение — запуск в реальную работу: миграция данных, обучение людей, поэтапный запуск.",
  "Сопровождение — жизнь после релиза: исправления, доработки, поддержка пользователей.",
  "Чем позже найдена ошибка, тем дороже её исправить: ошибка в требованиях, дожившая до релиза, тянет за собой переделку всех этапов."],
 tasks:[
  {t:"order",q:"Команда «Ежа» садится планировать работу над приложением. Расставьте этапы жизненного цикла в правильном порядке.",
   items:["Анализ требований","Проектирование","Разработка","Тестирование","Внедрение","Сопровождение"],
   exp:"Сначала выясняем, ЧТО делаем (требования), затем КАК (проектирование), потом создаём, проверяем, запускаем и поддерживаем."},
  {t:"quiz",q:"Приложение «Ёж» уже в сторах. Пользователи жалуются: при оплате картой «Мир» приложение зависает. Команда выпускает исправление. Какой это этап?",
   opts:["Разработка","Тестирование","Сопровождение","Внедрение"],a:2,
   exp:"Продукт уже выпущен и живёт у пользователей — всё, что происходит после релиза (исправления, доработки), относится к сопровождению."},
  {t:"quiz",q:"Команда банка «Сфера» выбирает архитектуру нового кабинета: рисует схему базы данных и продумывает интеграцию с процессингом. Какой это этап?",
   opts:["Анализ требований","Проектирование","Разработка","Внедрение"],a:1,
   exp:"Требования уже известны, теперь команда решает, КАК система будет устроена внутри. Это проектирование."},
  {t:"quiz",q:"Аналитик «Ежа» встречается с директором по логистике и выясняет, как сегодня заказы распределяются между курьерами и где узкие места. Этап?",
   opts:["Проектирование","Тестирование","Внедрение","Анализ требований"],a:3,
   exp:"Изучение текущих процессов и потребностей заказчика — сердце этапа анализа требований."},
  {t:"quiz",q:"QA-инженер обнаружил: если корзина пуста, кнопка «Оплатить» всё равно активна и создаёт заказ на 0 ₽. На каком этапе поймана проблема?",
   opts:["Тестирование","Сопровождение","Проектирование","Анализ требований"],a:0,
   exp:"Дефект найден при проверке системы до релиза — это тестирование. Хорошо, что не после: на проде такой баг стоил бы репутации."},
  {t:"quiz",q:"Сеть клиник переходит с записи в Excel на новую систему: переносят данные, обучают администраторов, запускают по одному филиалу в неделю. Этап?",
   opts:["Разработка","Внедрение","Сопровождение","Проектирование"],a:1,
   exp:"Миграция данных, обучение сотрудников и поэтапный запуск — классические работы этапа внедрения."},
  {t:"quiz",q:"Ошибку в требованиях нашли только после релиза. Почему её исправление — самое дорогое?",
   opts:["Потому что программисты берут дороже за срочность","Придётся заново пройти все этапы: перепроектировать, переписать код, перетестировать и перевыпустить","Заказчик обязательно выставит штраф","Это миф — цена ошибки одинакова на любом этапе"],a:1,
   exp:"Ошибка «протекает» вниз по этапам: неверное требование → неверный дизайн → неверный код → неверные тесты. Исправлять приходится всю цепочку."},
  {t:"match",q:"Соотнесите действие команды с этапом жизненного цикла.",
   pairs:[["Согласование ТЗ с заказчиком","Анализ требований"],["Выбор СУБД и проектирование API","Проектирование"],["Написание кода и код-ревью","Разработка"],["Регрессионная проверка перед релизом","Тестирование"],["Обучение сотрудников заказчика","Внедрение"]],
   exp:"Каждый этап имеет свои характерные работы: документы и договорённости → технические решения → код → проверки → запуск у заказчика."},
  {t:"quiz",q:"Стартап решил сэкономить и пропустить тестирование: «разработчики сами всё проверят». Что вероятнее всего произойдёт?",
   opts:["Ничего — разработчики и правда всё проверят","Дефекты доедут до пользователей, и исправлять их на работающем продукте будет дороже и больнее","Проект просто завершится раньше срока","Заказчик не заметит разницы"],a:1,
   exp:"Автор кода плохо видит собственные ошибки. Пропуск тестирования не отменяет багов — он лишь переносит их поиск на пользователей."},
  {t:"quiz",q:"Что из перечисленного НЕ является этапом жизненного цикла ПО?",
   opts:["Сопровождение","Проектирование","Продажа лицензий конкурентам","Внедрение"],a:2,
   exp:"Сопровождение, проектирование и внедрение — этапы ЖЦ. Продажи и маркетинг — важные дела компании, но не этапы жизненного цикла ПО."}
 ]},

{id:"team",num:"02",title:"Команда проекта",
 desc:"В студии «Код и Ко» кипит работа над несколькими продуктами. Разберитесь, кто есть кто в команде и к кому бежать в каждой ситуации.",
 theory:[
  "Менеджер проекта отвечает за сроки, бюджет и ресурсы; владелец продукта (Product Owner) — за ценность продукта и приоритеты.",
  "Аналитик выявляет и описывает требования, «переводит» бизнес на язык разработки.",
  "Разработчики пишут код, тестировщики (QA) проверяют качество и заводят дефекты.",
  "Дизайнер (UI/UX) проектирует интерфейс и сценарии взаимодействия.",
  "DevOps-инженер отвечает за инфраструктуру, сборку и выкладку релизов.",
  "Scrum-мастер — хранитель процесса: помогает команде работать по правилам и убирает препятствия, но не раздаёт задачи."],
 tasks:[
  {t:"match",q:"Соотнесите роль в команде с её зоной ответственности.",
   pairs:[["Менеджер проекта","Сроки, бюджет и ресурсы проекта"],["Аналитик","Выявление и описание требований"],["Разработчик","Написание и сопровождение кода"],["Тестировщик (QA)","Проверка качества и поиск дефектов"],["Дизайнер (UI/UX)","Интерфейс и сценарии взаимодействия"],["DevOps-инженер","Инфраструктура и выкладка релизов"]],
   exp:"У каждой роли своя зона ответственности — но работают они как единая команда, и границы иногда пересекаются."},
  {t:"quiz",q:"Заказчик: «Хочу приложение как у Яндекс Лавки, только лучше». Кто первым должен детально разобраться, что скрывается за этой фразой?",
   opts:["Разработчик — сразу начать писать код","Аналитик — выяснить реальные цели и потребности","Дизайнер — нарисовать красивые экраны","DevOps — развернуть серверы"],a:1,
   exp:"«Как у X, только лучше» — не требование, а повод для разговора. Аналитик выясняет, что именно нравится, для кого продукт и какую проблему он решает."},
  {t:"quiz",q:"Проект отстаёт на три недели, бюджет тает. Кто отвечает за перепланирование сроков и перераспределение ресурсов?",
   opts:["Тестировщик","Аналитик","Менеджер проекта","Разработчик"],a:2,
   exp:"Сроки, бюджет, ресурсы и риски — прямая ответственность менеджера проекта."},
  {t:"quiz",q:"До релиза два дня, всё сделать не успеть. Кто принимает решение, какие функции войдут в релиз, а какие подождут?",
   opts:["Владелец продукта (Product Owner)","Самый опытный разработчик","Тестировщик","DevOps-инженер"],a:0,
   exp:"Приоритеты функциональности — решение владельца продукта: он отвечает за ценность продукта и знает, что важнее для бизнеса."},
  {t:"quiz",q:"Разработчик спрашивает: «А что показывать, если у пользователя ещё нет ни одного заказа?» В ТЗ это не описано. К кому вопрос?",
   opts:["К DevOps-инженеру","К аналитику","К другому разработчику","Ни к кому — придумать самому"],a:1,
   exp:"Пробел в требованиях закрывает аналитик: он уточнит у заказчика и зафиксирует решение. «Придумать самому» — путь к переделкам."},
  {t:"quiz",q:"Ночью упал продакшен: сервер не отвечает, приложение недоступно. Кто первым разбирается с инфраструктурой?",
   opts:["Аналитик","Дизайнер","DevOps-инженер","Менеджер проекта"],a:2,
   exp:"Серверы, окружения, мониторинг и восстановление после сбоев — территория DevOps."},
  {t:"quiz",q:"QA заметил: система округляет сумму заказа не так, как написано в ТЗ. Что он должен сделать?",
   opts:["Молча исправить код","Завести дефект с шагами воспроизведения и ссылкой на требование","Переписать ТЗ под то, как работает система","Сообщить заказчику напрямую"],a:1,
   exp:"Тестировщик фиксирует расхождение с требованием как дефект — с шагами, ожидаемым и фактическим результатом. Дальше команда решает, чинить код или уточнять требование."},
  {t:"sort",q:"Утренняя планёрка: раскидайте задачи из бэклога по исполнителям.",
   buckets:["Аналитик","Разработчик","Тестировщик"],
   items:[["Провести интервью с заказчиком о процессе возвратов",0],["Написать миграцию базы данных для новых полей",1],["Составить чек-лист проверки формы оплаты",2],["Описать альтернативные сценарии use case «Возврат товара»",0],["Починить падение приложения при пустой корзине",1],["Прогнать регрессионные проверки перед релизом",2]],
   exp:"Аналитик — требования и сценарии, разработчик — код и исправления, тестировщик — проверки и качество."},
  {t:"quiz",q:"Чем Scrum-мастер отличается от менеджера проекта?",
   opts:["Ничем, это одна и та же роль","Scrum-мастер помогает команде соблюдать процесс и устраняет препятствия, а не управляет сроками и людьми","Scrum-мастер — главный разработчик в команде","Scrum-мастер ставит задачи каждому участнику"],a:1,
   exp:"Scrum-мастер — «хранитель процесса»: следит за практиками Scrum и убирает помехи. Управление сроками и ресурсами — не его функция."}
 ]},

{id:"analyst",num:"03",title:"Роль аналитика",
 desc:"Один день из жизни аналитика: недосказанные хотелки, конфликтующие стейкхолдеры и заказчик, который «всё расскажет потом». Примите верные решения.",
 theory:[
  "Аналитик — мост между бизнесом и командой: переводит потребности заказчика в понятные и проверяемые требования.",
  "Главный вопрос аналитика — не «что сделать?», а «какую проблему решаем и зачем?».",
  "Расплывчатые слова («быстро», «удобно», «много») аналитик превращает в измеримые формулировки.",
  "Артефакты аналитика: ТЗ, use case, user story, глоссарий, схемы процессов и данных.",
  "Конфликты требований аналитик не решает единолично — он делает их видимыми и организует согласование.",
  "Все договорённости фиксируются письменно: слова забываются, документы — нет."],
 tasks:[
  {t:"quiz",q:"В чём главная ценность аналитика на проекте?",
   opts:["Пишет код быстрее разработчиков","Переводит потребности бизнеса на язык команды разработки — и обратно","Контролирует бюджет проекта","Отвечает за дизайн интерфейсов"],a:1,
   exp:"Аналитик — переводчик и посредник: помогает бизнесу и разработке понять друг друга без искажений. Без него «испорченный телефон» почти гарантирован."},
  {t:"quiz",q:"Заказчик: «Добавьте кнопку экспорта в Excel». Каким должен быть первый шаг хорошего аналитика?",
   opts:["Записать требование и передать разработчикам","Спросить, какую задачу заказчик хочет решить этим экспортом","Отказать: экспорт — это сложно","Сразу оценить сроки разработки"],a:1,
   exp:"Заказчик принёс решение, а не проблему. Возможно, ему нужен наглядный отчёт — и дашборд решит задачу лучше выгрузки. Сначала «зачем?», потом «что делаем»."},
  {t:"quiz",q:"Заказчик: «Система должна работать быстро». Как поступить с таким требованием?",
   opts:["Записать как есть — смысл понятен","Уточнить измеримо: какие операции, за сколько секунд, при какой нагрузке","Проигнорировать — все системы должны работать быстро","Пообещать «максимальную скорость»"],a:1,
   exp:"«Быстро» у каждого своё. Проверяемая версия: «Поиск по каталогу возвращает результат не дольше 2 секунд при 1000 одновременных пользователей»."},
  {t:"quiz",q:"Что из перечисленного — типичные артефакты работы аналитика?",
   opts:["Исходный код и автотесты","ТЗ, use case, user story, глоссарий","Серверы и конфигурация CI/CD","Макеты в Figma и дизайн-система"],a:1,
   exp:"Аналитик создаёт документы, описывающие требования и сценарии. Код — у разработчиков, инфраструктура — у DevOps, макеты — у дизайнера."},
  {t:"quiz",q:"Разработчик понял под словом «заявка» одно, а бухгалтерия заказчика — совсем другое. Модуль пришлось переделывать. Что помогло бы избежать проблемы?",
   opts:["Более длинное ТЗ","Глоссарий проекта с согласованными определениями терминов","Ежедневные созвоны","Опытный разработчик"],a:1,
   exp:"Глоссарий — маленький документ, который спасает от больших переделок: каждый ключевой термин имеет одно согласованное значение для всех."},
  {t:"quiz",q:"Отдел продаж требует сократить форму заявки до 3 полей, а служба безопасности — добавить проверку паспорта. Что делает аналитик?",
   opts:["Выбирает вариант, который лично ему нравится","Делает форму на 3 поля — продажи важнее","Фиксирует конфликт требований и организует обсуждение приоритетов между стейкхолдерами","Делает обе версии формы, чтобы никого не обидеть"],a:2,
   exp:"Конфликт требований — нормальная ситуация. Задача аналитика — сделать его явным, показать последствия каждого варианта и привести стороны к решению."},
  {t:"quiz",q:"Чем, упрощённо, бизнес-аналитик отличается от системного аналитика?",
   opts:["Бизнес-аналитик работает с целями и процессами бизнеса, системный — с требованиями к системе и интеграциями","Бизнес-аналитик зарабатывает больше","Системный аналитик не общается с людьми","Ничем — это синонимы"],a:0,
   exp:"Бизнес-аналитик отвечает на вопрос «что нужно бизнесу», системный — «как это должно быть устроено в системе». На практике роли часто совмещают."},
  {t:"quiz",q:"Заказчик на встречах молчит и со всем соглашается, а после показа продукта требует переделок. Что стоит изменить аналитику?",
   opts:["Проводить встречи реже, чтобы меньше переделывать","Задавать открытые вопросы, показывать прототипы и письменно фиксировать договорённости","Исключить заказчика из обсуждений","Соглашаться на все переделки без обсуждения"],a:1,
   exp:"Молчаливое «да» — сигнал, что заказчик не видит будущий продукт. Прототипы делают разговор предметным, открытые вопросы вытягивают детали, а протокол встречи защищает обе стороны."},
  {t:"dialog",q:"Допрос свидетеля: интервью с владельцем фитнес-клуба «Атлант». Ведите разговор как аналитик — выбирайте лучшую реплику.",
   who:"Олег, владелец клуба «Атлант»",init:"О",
   steps:[
    {say:"Нам срочно нужно мобильное приложение! У всех конкурентов уже есть.",
     opts:["Отлично, завтра начнём разработку. Какого цвета сделать иконку?","Расскажите, какие задачи клуба вы хотите решить приложением?","Приложение — это дорого. Может, обойдётесь без него?"],a:1,
     exp:"Сначала выясняем цель и проблему, а не обсуждаем решение."},
    {say:"Ну… клиенты постоянно звонят администратору, чтобы записаться на тренировку. Телефон занят, люди злятся и уходят.",
     opts:["Ясно, добавим в приложение новости клуба и магазин мерча.","Понял: ключевая боль — запись. А кто ещё участвует в этом процессе, кроме администратора?","Назовите точную сумму бюджета, остальное потом."],a:1,
     exp:"Раскручиваем проблему дальше и ищем всех участников процесса."},
    {say:"Тренеры ведут расписание в тетрадках, а администратор сводит всё в Excel. Каждый вечер — час сверки.",
     opts:["Тетрадки — несерьёзно! Пусть сразу работают по-новому, без обсуждений.","Могу я день понаблюдать за работой администратора и поговорить с парой тренеров?","Excel нам не помеха, просто перенесём его в приложение как есть."],a:1,
     exp:"Наблюдение и интервью с реальными участниками покажут процесс, о котором владелец может и не знать."},
    {say:"Конечно, приходите! И главное — приложение должно быть удобным. Это же и так понятно?",
     opts:["Абсолютно. Так и запишем: «удобное приложение».","«Удобно» у каждого своё. Зафиксируем измеримо: например, «запись на тренировку — не больше трёх нажатий».","Удобство — дело вкуса, фиксировать его не будем."],a:1,
     exp:"Расплывчатые слова превращаем в проверяемые формулировки."}],
   exp:"Хорошее интервью: от «хочу приложение» — к реальной боли (запись), участникам процесса и измеримым требованиям."},
  {t:"dialog",q:"Допрос свидетеля: разработчик пришёл с вопросами по вашему ТЗ. Отвечайте как аналитик.",
   who:"Дима, разработчик",init:"Д",
   steps:[
    {say:"Тут написано «отчёт должен строиться мгновенно». Мгновенно — это как?!",
     opts:["Ну сделай максимально быстро, как получится.","Формулировка и правда плохая. Уточню у заказчика измеримый порог: какой объём данных и сколько секунд приемлемо.","Передам заказчику, что это невозможно."],a:1,
     exp:"Неизмеримое требование — брак в работе аналитика. Чиним его у источника — у заказчика."},
    {say:"И ещё: «пользователь» в ТЗ — это кто? Покупатель? Менеджер? У них же разные права!",
     opts:["Без разницы — все они пользователи.","Отличный вопрос. Заведу глоссарий и разведу роли: покупатель, менеджер, администратор — и права каждой.","Придумай сам, ты же разработчик."],a:1,
     exp:"Многозначный термин — источник переделок. Глоссарий снимает вопрос для всей команды."},
    {say:"Заказчик вчера в чате попросил «по-быстрому добавить скидки». Мне делать?",
     opts:["Делай, раз заказчик просит.","Пока нет: зафиксирую требование, оценим с командой влияние на сроки и согласуем приоритет с владельцем продукта.","Игнорируй — в ТЗ этого нет и не будет."],a:1,
     exp:"«Быстрые» просьбы мимо процесса ломают сроки. Изменение фиксируется, оценивается и приоритизируется."}],
   exp:"Аналитик защищает команду от неоднозначности: измеримые пороги, глоссарий ролей и управляемые изменения требований."}
 ]},

{id:"req",num:"04",title:"Требования",
 desc:"Интернет-магазин «Лавка №1» заказал новую версию сайта. Вам достался черновик требований — наведите в нём порядок: классифицируйте, почините формулировки, расставьте приоритеты.",
 theory:[
  "Функциональные требования — ЧТО делает система (действия, функции: «пользователь может оплатить заказ»).",
  "Нефункциональные — КАК она это делает: производительность, надёжность, безопасность, удобство.",
  "Бизнес-требования — цели верхнего уровня («увеличить долю онлайн-продаж до 40%»).",
  "Хорошее требование: однозначное, измеримое, проверяемое, непротиворечивое, полное.",
  "«Быстро», «удобно», «современно» — не требования, пока не превращены в измеримые формулировки.",
  "Приоритизация MoSCoW: Must (без этого нельзя), Should (важно), Could (хорошо бы), Won't (не в этот раз)."],
 tasks:[
  {t:"sort",q:"Разберите черновик требований «Лавки №1»: какое требование функциональное, а какое — нефункциональное?",
   buckets:["Функциональное","Нефункциональное"],
   items:[["Покупатель может оплатить заказ банковской картой",0],["Страница каталога загружается не дольше 2 секунд",1],["Пользователь может восстановить пароль по email",0],["Система выдерживает 10 000 одновременных посетителей",1],["Администратор может заблокировать пользователя",0],["Данные карт передаются только по защищённому соединению",1],["Покупатель получает чек на почту после оплаты",0],["Сайт корректно работает в Chrome и Safari последних версий",1]],
   exp:"Функциональные — про действия и возможности («может сделать X»). Нефункциональные — про качество: скорость, нагрузка, безопасность, совместимость."},
  {t:"quiz",q:"Найдите плохое требование в черновике.",
   opts:["Заказ можно отменить до момента передачи в доставку","Интерфейс должен быть удобным и современным","Отчёт о продажах выгружается в формате XLSX","История заказов хранится не менее 3 лет"],a:1,
   exp:"«Удобный и современный» нельзя проверить: у каждого своё мнение. Остальные требования конкретны — их можно однозначно протестировать."},
  {t:"quiz",q:"Заказчик написал: «Отчёт должен формироваться быстро». Какая переформулировка делает требование проверяемым?",
   opts:["Отчёт формируется максимально быстро","Отчёт формируется без задержек","Отчёт за месяц формируется не дольше 10 секунд","Отчёт формируется быстрее, чем у конкурентов"],a:2,
   exp:"Проверяемое требование содержит измеримый порог: взял отчёт за месяц, засёк время, сравнил с 10 секундами. «Максимально» и «без задержек» проверить нельзя."},
  {t:"quiz",q:"В ТЗ написано: «Система должна поддерживать много пользователей». Что уточнить у заказчика в первую очередь?",
   opts:["Какого цвета будет кнопка входа","Сколько одновременных пользователей ожидается и в какие пиковые моменты","На каком языке программирования писать систему","Сколько стоит сервер"],a:1,
   exp:"«Много» — это 100 или 100 000? Разница — в архитектуре и бюджете. Уточняем цифры и пиковые сценарии (например, распродажа)."},
  {t:"quiz",q:"«Увеличить долю онлайн-заказов с 20% до 60% за год». Какого уровня это требование?",
   opts:["Функциональное","Нефункциональное","Бизнес-требование","Это вообще не требование"],a:2,
   exp:"Это цель бизнеса — ради неё затевается проект. Из неё аналитик выведет пользовательские и функциональные требования."},
  {t:"quiz",q:"Найдите пару противоречащих друг другу требований.",
   opts:["«Пароль не короче 8 символов» и «Пароль содержит цифру»","«Регистрация только по номеру телефона» и «Пользователь может зарегистрироваться, не указывая телефон»","«Чек отправляется на email» и «Чек доступен в личном кабинете»","«Сайт работает в Chrome» и «Сайт работает в Safari»"],a:1,
   exp:"Первое требование делает телефон обязательным, второе — необязательным. Одновременно выполнить оба нельзя: противоречие нужно разрешить со стейкхолдерами."},
  {t:"quiz",q:"«Push-уведомление о смене статуса заказа приходит не позже чем через 30 секунд». Какое это требование?",
   opts:["Функциональное","Нефункциональное — про производительность","Бизнес-требование","Ограничение бюджета"],a:1,
   exp:"Сама отправка уведомлений — функция. А вот «не позже 30 секунд» — характеристика качества, то есть нефункциональное требование."},
  {t:"quiz",q:"Заказчик принёс список из 100 «хотелок» и требует всё в первом релизе через 2 месяца. Что делает аналитик?",
   opts:["Обещает успеть всё","Молча выбирает 20 понравившихся пунктов","Проводит приоритизацию с заказчиком, например по методу MoSCoW","Предлагает перенести релиз на 2 года"],a:2,
   exp:"Приоритизация — честный разговор о том, без чего продукт не имеет смысла (Must), а что подождёт. Решает заказчик, аналитик — модерирует и показывает последствия."},
  {t:"quiz",q:"В методе MoSCoW категория Must have означает:",
   opts:["Функции, которые хочется сделать при наличии времени","Требования, без которых релиз теряет смысл","Требования, отложенные до следующих версий","Самые дорогие в разработке функции"],a:1,
   exp:"Must — критичный минимум: без этих требований продукт нельзя выпускать. Should — важно, Could — желательно, Won't — осознанно не в этот раз."},
  {t:"quiz",q:"Какое из требований можно проверить тестом прямо сейчас?",
   opts:["Сайт должен нравиться посетителям","Дизайн должен выглядеть дорого","При вводе неверного пароля 5 раз подряд аккаунт блокируется на 15 минут","Система должна быть надёжной"],a:2,
   exp:"Есть чёткое условие и ожидаемый результат: ввёл 5 раз неверный пароль — проверил блокировку и её длительность. Остальные формулировки субъективны."},
  {t:"spot",q:"Перед вами фрагмент ТЗ «Лавки №1». Одно требование непроверяемо — найдите его и нажмите на строку.",
   doc:"ТЗ «Лавка №1» · Раздел 4. Требования к каталогу",
   lines:["4.1. Покупатель может добавить товар в корзину без регистрации.","4.2. Поиск по каталогу возвращает результаты не дольше 2 секунд.","4.3. Интерфейс каталога должен вызывать вау-эффект у посетителей.","4.4. Чек отправляется на email в течение минуты после оплаты.","4.5. История заказов хранится не менее 3 лет."],bad:2,
   exp:"«Вау-эффект» нельзя измерить и проверить тестом — у каждого он свой. Остальные пункты содержат конкретные, проверяемые условия."},
  {t:"spot",q:"В разделе о регистрации спряталось требование, противоречащее остальным. Найдите его.",
   doc:"ТЗ «Лавка №1» · Раздел 6. Регистрация",
   lines:["6.1. Регистрация возможна только по номеру мобильного телефона.","6.2. СМС с кодом подтверждения приходит не дольше чем за 30 секунд.","6.3. Пользователь может зарегистрироваться, указав только email.","6.4. Номер телефона подтверждается кодом из СМС."],bad:2,
   exp:"Пункт 6.1 делает телефон обязательным, а 6.3 разрешает регистрацию совсем без него. Выполнить оба сразу невозможно — конфликт разрешается с заказчиком до разработки."}
 ]},

{id:"gather",num:"05",title:"Техники сбора требований",
 desc:"Вы — аналитик консалтинговой студии. Пять разных заказчиков, пять разных ситуаций — для каждой нужно выбрать подходящую технику выявления требований.",
 theory:[
  "Интервью — глубокий разговор с ключевыми людьми; лучшая техника для сложных тем и деталей.",
  "Анкетирование — быстрый сбор мнений большого числа людей; вопросы должны быть простыми.",
  "Наблюдение (job shadowing) — смотрим, как люди реально работают: слова и дела часто расходятся.",
  "Анализ документов — регламенты, инструкции, отчёты старой системы: бесплатный источник фактов.",
  "Прототипирование — показываем макет, когда заказчик «не знает, чего хочет, пока не увидит».",
  "Мозговой штурм — быстрый сбор идей от группы; сначала количество, критика потом.",
  "В интервью работают открытые вопросы («расскажите, как…»); наводящие вопросы искажают ответы."],
 tasks:[
  {t:"quiz",q:"Нужно узнать мнение 5 000 пользователей приложения о новой функции. Бюджет и время ограничены. Какая техника подойдёт лучше всего?",
   opts:["Интервью с каждым пользователем","Анкетирование (онлайн-опрос)","Наблюдение за каждым пользователем","Мозговой штурм с командой"],a:1,
   exp:"Опрос — единственный способ дёшево охватить тысячи людей. Интервью с 5 000 человек заняло бы годы."},
  {t:"quiz",q:"Сотрудники склада на словах описывают процесс сборки заказа одним образом, но результаты почему-то не сходятся. Как понять, что происходит на самом деле?",
   opts:["Провести ещё одно интервью","Разослать анкету","Понаблюдать за реальной работой на складе (job shadowing)","Изучить должностные инструкции"],a:2,
   exp:"Люди искренне описывают процесс «как положено», а работают «как удобно». Наблюдение вскрывает реальный процесс со всеми обходными путями."},
  {t:"quiz",q:"Заказчик — единственный эксперт по сложному процессу таможенного оформления. Деталей много, тема запутанная. Ваш выбор?",
   opts:["Анкетирование","Серия глубоких интервью с экспертом","Мозговой штурм","Опрос в соцсетях"],a:1,
   exp:"Один носитель знаний + сложная предметная область = интервью. Можно задавать уточняющие вопросы, разбирать примеры и возвращаться к непонятному."},
  {t:"quiz",q:"У заказчика есть регламенты, должностные инструкции и документация старой системы. С чего разумно начать до встреч с людьми?",
   opts:["С мозгового штурма","С анализа документов","С прототипирования","С анкетирования"],a:1,
   exp:"Документы позволяют прийти на интервью подготовленным: вы уже знаете термины, процессы и историю — и не тратите время эксперта на азы."},
  {t:"quiz",q:"Заказчик: «Не могу объяснить, какой интерфейс мне нужен. Покажите — скажу, нравится или нет». Какая техника выручит?",
   opts:["Прототипирование","Анализ документов","Анкетирование","Изучение конкурентов"],a:0,
   exp:"Кликабельный макет делает обсуждение предметным: заказчик реагирует на конкретные экраны, а не на абстрактные описания."},
  {t:"quiz",q:"Новый продукт, нужно быстро собрать как можно больше идей от команды и заказчика. Что выбрать?",
   opts:["Индивидуальные интервью в течение месяца","Мозговой штурм","Наблюдение","Анализ документов"],a:1,
   exp:"Мозговой штурм генерирует много идей за короткое время. Главное правило: сначала собираем всё без критики, отбор — потом."},
  {t:"quiz",q:"Какой из вопросов — открытый (подходит для начала интервью)?",
   opts:["«Вам нужна кнопка экспорта?»","«Вы согласны, что старая система неудобна?»","«Расскажите, как сейчас проходит оформление заказа?»","«Вы предпочитаете синий или зелёный дизайн?»"],a:2,
   exp:"Открытый вопрос нельзя закрыть «да/нет» — он приглашает рассказать. Именно из таких рассказов аналитик добывает неожиданные детали."},
  {t:"quiz",q:"Аналитик спрашивает: «Вам ведь нравится наша идея с подпиской, правда?» Какую ошибку он совершает?",
   opts:["Слишком короткий вопрос","Наводящий вопрос — подталкивает к «правильному» ответу","Слишком сложный вопрос","Никакой — вопрос отличный"],a:1,
   exp:"Наводящий вопрос давит на собеседника: неудобно ответить «нет». Данные из таких ответов ненадёжны. Лучше: «Как вы относитесь к идее подписки?»"},
  {t:"quiz",q:"Завтра интервью с финансовым директором заказчика. Что нужно сделать сегодня?",
   opts:["Ничего — импровизация покажет профессионализм","Изучить предметную область и подготовить список вопросов и целей встречи","Подготовить презентацию о себе на 40 минут","Отправить директору анкету на 100 вопросов"],a:1,
   exp:"Час подготовки экономит часы переспрашиваний. Цель встречи, список вопросов, изученные материалы — минимальный набор профессионала."},
  {t:"quiz",q:"Вы собираете требования к новому мобильному банку. Какая комбинация техник самая разумная?",
   opts:["Только анкетирование — быстро и дёшево","Интервью со стейкхолдерами + анализ документов + прототипы ключевых экранов + опрос клиентов","Только мозговой штурм с командой разработки","Скопировать приложение конкурента"],a:1,
   exp:"Техники дополняют друг друга: документы дают факты, интервью — глубину, прототипы — обратную связь, опрос — массовую картину. Одной техники почти никогда не хватает."},
  {t:"dialog",q:"Допрос свидетеля: у вас всего 20 минут на интервью с главным бухгалтером завода. Не потеряйте их.",
   who:"Нина Петровна, главный бухгалтер",init:"Н",
   steps:[
    {say:"Здравствуйте. У меня ровно двадцать минут, давайте быстрее.",
     opts:["Сначала расскажу про нашу компанию — минут на пятнадцать.","Тогда сразу к главному: расскажите, как сейчас проходит согласование счетов?","Вам ведь ужасно неудобно работать в старой системе, правда?"],a:1,
     exp:"Открытый вопрос сразу по ключевой теме — лучшее начало короткого интервью. Третий вариант — наводящий вопрос."},
    {say:"Счета носим директору на подпись в бумаге. Если он в командировке — всё стоит.",
     opts:["Бумага — прошлый век! У нас всё будет в облаке.","Значит, узкое место — подпись директора. А что происходит со счетами, пока он в отъезде?","Почему вы до сих пор так работаете?!"],a:1,
     exp:"Уточняющий вопрос раскручивает проблему дальше. Оценки и обещания решений на интервью только мешают."},
    {say:"Копятся на столе. Потом аврал — и он подписывает всю пачку не глядя.",
     opts:["Картина ясна: узкое место и риск бесконтрольной подписи. Пришлю резюме встречи — проверите, всё ли я верно понял?","Не глядя? Отлично, значит, контроль не нужен — так и запишем.","Ну, время вышло. До свидания!"],a:0,
     exp:"Итог интервью фиксируется письменно и проверяется собеседником — так договорённости не потеряются."}],
   exp:"Формула короткого интервью: открытый вопрос по сути → уточнение узкого места → письменная фиксация итогов с проверкой."}
 ]},

{id:"method",num:"06",title:"Методологии разработки",
 desc:"Четыре проекта — четыре разных подхода. Разберитесь, где нужен строгий Waterfall, где — гибкий Scrum, а где выручит Kanban.",
 theory:[
  "Waterfall («водопад») — этапы строго последовательно: пока не закончили требования, не проектируем. Возврат назад дорог.",
  "Waterfall уместен, когда требования стабильны и известны заранее (госконтракты, строгие регуляторные проекты).",
  "Agile — семейство гибких подходов: короткие итерации, регулярная обратная связь, готовность к изменениям.",
  "Scrum — работа спринтами (1–4 недели), в конце каждого — работающий инкремент и демо заказчику. Роли: владелец продукта, Scrum-мастер, команда.",
  "Kanban — непрерывный поток задач: доска, ограничение работы «в процессе» (WIP-лимит), без обязательных спринтов.",
  "Манифест Agile: люди важнее процессов, работающий продукт важнее документации, сотрудничество важнее контракта, готовность к изменениям важнее следования плану."],
 tasks:[
  {t:"quiz",q:"В чём главное отличие Agile-подходов от Waterfall?",
   opts:["В Agile не пишут документацию вообще","Agile работает короткими итерациями и приветствует изменения; Waterfall проходит этапы строго последовательно","Waterfall быстрее","В Agile нет тестирования"],a:1,
   exp:"Agile регулярно показывает заказчику работающий продукт и корректирует курс. Waterfall движется по плану: изменения после утверждения требований стоят дорого."},
  {t:"quiz",q:"Госконтракт на систему учёта: требования зафиксированы законом и техзаданием, изменения почти невозможны, нужна полная документация и приёмка по ГОСТ. Какой подход выбрать?",
   opts:["Scrum","Kanban","Waterfall","Работать без методологии"],a:2,
   exp:"Стабильные требования + формальная приёмка + обязательная документация — идеальные условия для водопада."},
  {t:"quiz",q:"Стартап делает приложение для аренды самокатов. Рынок непонятен, гипотезы меняются каждые две недели, нужно быстро проверять идеи на пользователях. Подход?",
   opts:["Waterfall с ТЗ на 200 страниц","Scrum с короткими спринтами","Ничего не выбирать, просто писать код","V-модель"],a:1,
   exp:"Когда требования постоянно меняются, короткие спринты с демо и обратной связью позволяют дёшево ошибаться и быстро учиться."},
  {t:"quiz",q:"Команда поддержки внутренних сервисов: задачи прилетают непрерывным потоком, общего дедлайна нет, важно не хвататься за всё сразу. Что подойдёт?",
   opts:["Waterfall","Scrum со спринтами по месяцу","Kanban с WIP-лимитами","Мозговой штурм"],a:2,
   exp:"Для потока разнородных задач без общего релиза Kanban — визуальная доска и ограничение числа задач «в работе» — подходит лучше жёстких спринтов."},
  {t:"quiz",q:"Что такое спринт в Scrum?",
   opts:["Совещание, где все стоят","Фиксированный отрезок времени (1–4 недели), к концу которого команда выдаёт работающий инкремент продукта","Период аврала перед релизом","Список всех задач проекта"],a:1,
   exp:"Спринт — ритм команды: одинаковая длительность, понятная цель, в конце — работающий кусочек продукта и демо заказчику."},
  {t:"quiz",q:"Кто в Scrum отвечает за бэклог продукта и порядок задач в нём?",
   opts:["Scrum-мастер","Вся команда голосованием","Владелец продукта (Product Owner)","Самый быстрый разработчик"],a:2,
   exp:"Владелец продукта наполняет и приоритизирует бэклог: он отвечает за то, чтобы команда делала самое ценное для бизнеса."},
  {t:"quiz",q:"Что происходит на ежедневном стендапе (daily) в Scrum?",
   opts:["Подробный отчёт каждого перед менеджером, час-полтора","Короткая синхронизация ~15 минут: что сделано, что дальше, что мешает","Распределение премий","Демо продукта заказчику"],a:1,
   exp:"Daily — не отчёт начальству, а синхронизация команды: быстро выявить блокеры и договориться о помощи. Полтора часа — признак того, что встреча сломалась."},
  {t:"quiz",q:"Зачем на Kanban-доске ограничивают число задач «в работе» (WIP-лимит)?",
   opts:["Чтобы сотрудники меньше работали","Чтобы задачи завершались, а не копились начатыми: меньше переключений — быстрее поток","Для красоты доски","Чтобы менеджер видел, кто ленится"],a:1,
   exp:"Десять начатых задач хуже трёх законченных. Лимит заставляет доделывать, выявляет узкие места и ускоряет средний срок выполнения."},
  {t:"quiz",q:"Заказчик год ждал систему по Waterfall, а на приёмке сказал: «Это совсем не то, что я имел в виду». Какой риск методологии здесь сработал?",
   opts:["Слишком много совещаний","Обратная связь пришла слишком поздно — заказчик впервые увидел продукт в самом конце","Команда была слишком маленькой","Слишком частые релизы"],a:1,
   exp:"Главный риск водопада: месяцы работы без показа результата. Если требования были поняты неверно, узнаёшь об этом, когда переделывать дороже всего."},
  {t:"match",q:"Соотнесите подход с его ключевой характеристикой.",
   pairs:[["Waterfall","Этапы строго последовательно, возврат назад дорог"],["Scrum","Спринты фиксированной длины и демо в конце каждого"],["Kanban","Непрерывный поток задач и WIP-лимиты"],["Манифест Agile","Работающий продукт важнее исчерпывающей документации"]],
   exp:"Методология — инструмент под задачу: стабильные требования → водопад; быстрые изменения → Scrum; поток задач → Kanban."}
 ]},

{id:"story",num:"07",title:"User Story и Use Case",
 desc:"Команда маркетплейса переходит на пользовательские истории. Научитесь писать их правильно, отличать от use case и находить типичные ошибки.",
 theory:[
  "User story: «Как <роль>, я хочу <действие>, чтобы <ценность>». Коротко, от лица пользователя, с обязательным «зачем».",
  "История описывает потребность, а не техническое решение («хочу быстро находить товар», а не «хочу Elasticsearch»).",
  "Критерии приёмки — конкретные проверяемые условия, при которых история считается готовой.",
  "INVEST: история независима (I), обсуждаема (N), ценна (V), оцениваема (E), мала (S), проверяема (T).",
  "Слишком крупная история — эпик; её декомпозируют на маленькие.",
  "Use case — подробный сценарий взаимодействия актора с системой: предусловия, основной поток, альтернативные потоки, постусловия."],
 tasks:[
  {t:"build",q:"Соберите правильную user story для маркетплейса из фрагментов.",
   slots:[["Как","покупатель маркетплейса"],["я хочу","сохранять товары в избранное"],["чтобы","быстро вернуться к ним позже"]],
   bank:["покупатель маркетплейса","сохранять товары в избранное","быстро вернуться к ним позже","система","хранить данные в PostgreSQL","всё было красиво и современно"],
   exp:"Роль — живой пользователь (не «система»), действие — потребность (не техническое решение), ценность — конкретная выгода (не «красиво»)."},
  {t:"quiz",q:"Что не так с историей: «Как пользователь, я хочу базу данных PostgreSQL, чтобы данные хранились надёжно»?",
   opts:["Слишком короткая","Описано техническое решение, а не потребность пользователя — пользователю всё равно, какая СУБД внутри","Нет роли","Всё в порядке, отличная история"],a:1,
   exp:"Пользователь хочет «не терять свои данные», а выбор СУБД — решение команды. История фиксирует потребность, решение обсуждается отдельно."},
  {t:"quiz",q:"Чем use case отличается от user story?",
   opts:["Ничем, это синонимы","Use case подробно описывает сценарии взаимодействия с системой (потоки, условия), user story — краткая формулировка потребности с ценностью","Use case пишут только программисты","User story всегда длиннее"],a:1,
   exp:"История — «билет на разговор» размером с карточку. Use case — детальный сценарий: кто, при каких условиях, какими шагами и что может пойти не так."},
  {t:"quiz",q:"История: «Как покупатель, я хочу фильтровать товары по цене, чтобы находить подходящие по бюджету». Какой критерий приёмки сформулирован правильно?",
   opts:["Фильтр работает хорошо","Фильтр всем нравится","При выборе диапазона 1000–2000 ₽ в выдаче остаются только товары с ценой из этого диапазона","Фильтр сделан на React"],a:2,
   exp:"Критерий приёмки — проверяемое условие: задал диапазон, посмотрел выдачу, сравнил. «Хорошо» и «нравится» проверить нельзя, а технология — не критерий."},
  {t:"quiz",q:"В акрониме INVEST буква S означает Small — «маленькая». Почему это важно?",
   opts:["Маленькие истории приятнее читать","Маленькую историю можно оценить, сделать за спринт и быстро получить обратную связь","Чтобы бэклог выглядел длиннее","Это не важно, буква для красоты"],a:1,
   exp:"История на месяц работы неуправляема: её сложно оценить и проверить. Маленькие истории дают быстрый цикл «сделали — показали — узнали»."},
  {t:"order",q:"Расставьте разделы use case «Оплата заказа картой» в правильном порядке.",
   items:["Актор и цель","Предусловия","Основной сценарий","Альтернативные сценарии","Постусловия"],
   exp:"Сначала — кто и зачем, затем что должно быть верно до начала, основной «счастливый путь», ответвления и, наконец, состояние системы после."},
  {t:"quiz",q:"В бэклоге появилась история: «Как пользователь, я хочу личный кабинет». В чём проблема?",
   opts:["Нет проблем — берём в спринт","Слишком крупная (это эпик) и без ценности — нужно декомпозировать на маленькие истории с понятным «чтобы»","Слово «кабинет» — не термин","Нужно было писать на английском"],a:1,
   exp:"«Личный кабинет» — это десятки функций на месяцы работы. Дробим: «изменить пароль», «посмотреть историю заказов», «привязать карту» — и у каждой своё «чтобы»."},
  {t:"build",q:"Курьерская служба «Стрела» просит функцию для курьеров. Соберите историю.",
   slots:[["Как","курьер"],["я хочу","видеть маршрут доставки на карте"],["чтобы","привозить заказы быстрее"]],
   bank:["курьер","видеть маршрут доставки на карте","привозить заказы быстрее","мобильное приложение","использовать API Яндекс Карт","было удобно"],
   exp:"Роль — курьер, потребность — видеть маршрут, ценность — скорость доставки. «API Яндекс Карт» — решение, «удобно» — неизмеримая ценность."},
  {t:"quiz",q:"Кто является актором в use case «Оформление возврата товара» интернет-магазина?",
   opts:["База данных","Покупатель","Сервер приложения","Кнопка «Вернуть товар»"],a:1,
   exp:"Актор — внешний по отношению к системе участник с целью. Возврат инициирует покупатель; кнопки и серверы — части системы, а не акторы."},
  {t:"quiz",q:"Что из перечисленного — альтернативный поток use case «Оплата заказа картой»?",
   opts:["Покупатель успешно оплатил заказ","Банк отклонил платёж — система предлагает выбрать другой способ оплаты","Покупатель открыл сайт","Разработчик написал код оплаты"],a:1,
   exp:"Альтернативный поток — ответвление от «счастливого пути»: что делает система, когда что-то пошло не так. Успешная оплата — это основной сценарий."},
  {t:"quiz",q:"История: «Как менеджер, я хочу выгружать отчёт по продажам». Чего в ней не хватает?",
   opts:["Имени менеджера","Ценности — «чтобы…»: зачем менеджеру этот отчёт","Названия отдела","Даты создания истории"],a:1,
   exp:"Без «чтобы» непонятна цель — а значит, нельзя предложить лучшее решение и правильно расставить приоритет. Может, нужен не отчёт, а автоматическое уведомление?"},
  {t:"sort",q:"Определите: это свойство user story или use case?",
   buckets:["User story","Use case"],
   items:[["Пишется по шаблону «Как — я хочу — чтобы»",0],["Содержит основной и альтернативные потоки",1],["Помещается на карточку и служит поводом для обсуждения",0],["Описывает предусловия и постусловия",1],["Дополняется критериями приёмки для проверки готовности",0],["Пошагово перечисляет взаимодействие актора и системы",1]],
   exp:"История — компактная и разговорная, use case — структурный документ со сценариями. Оба инструмента полезны — на разных уровнях детализации."},
  {t:"spot",q:"Одна из историй в бэклоге маркетплейса написана с ошибкой. Найдите её и нажмите на строку.",
   doc:"Бэклог маркетплейса · Спринт 14",
   lines:["Как покупатель, я хочу фильтровать товары по бренду, чтобы быстрее находить любимые марки.","Как продавец, я хочу видеть остатки товара на складе, чтобы вовремя пополнять запасы.","Как система, я хочу использовать Redis, чтобы кэшировать запросы.","Как курьер, я хочу отмечать доставку одной кнопкой, чтобы не задерживаться у двери."],bad:2,
   exp:"«Система» — не пользователь, а Redis — техническое решение, а не потребность. Технические задачи оформляются отдельно, а не маскируются под user story."}
 ]},

{id:"final",num:"08",title:"Финальный проект: барбершоп «Форма»",
 desc:"Сквозной кейс-экзамен. Владелец сети барбершопов заказал приложение онлайн-записи. Вы — аналитик проекта: проведите его от первой встречи до жизни после релиза.",
 theory:[
  "Здесь пригодится всё: этапы ЖЦ, роли, техники сбора, классификация требований, методологии и user story.",
  "Порядок здоровых действий: понять проблему → собрать и приоритизировать требования → прототип → разработка → тестирование → запуск → сопровождение.",
  "Если сомневаетесь — вспоминайте главный вопрос аналитика: «какую проблему мы решаем и зачем?»"],
 tasks:[
  {t:"quiz",q:"Первая встреча. Владелец: «Клиентов мало, хочу приложение, у всех же есть». С чего начать?",
   opts:["Сразу писать код — время дорого","Выяснить на интервью цели и проблемы бизнеса: почему мало клиентов и чем поможет приложение","Скопировать приложение конкурента","Отправить владельцу договор на 2 млн"],a:1,
   exp:"«Хочу приложение» — решение, а не проблема. Возможно, клиенты уходят из-за очередей у телефона — тогда ключевая функция ясна. А может, дело вовсе не в записи."},
  {t:"quiz",q:"Администраторы ведут запись в бумажном журнале и по телефону, но объяснить процесс «по шагам» не могут — «руки сами делают». Как выявить реальный процесс?",
   opts:["Попросить написать регламент","Провести день рядом с администратором: наблюдение плюс уточняющие вопросы","Разослать клиентам анкету","Придумать процесс самому"],a:1,
   exp:"Когда знание «в руках», а не «в словах», работает наблюдение: вы увидите реальные шаги, исключения и хитрости, о которых в интервью не вспомнят."},
  {t:"quiz",q:"В список требований попало: «Запись на стрижку занимает не больше трёх экранов». Какое это требование?",
   opts:["Функциональное","Нефункциональное — про удобство использования","Бизнес-требование","Это не требование"],a:1,
   exp:"Сама запись — функция. А «не больше трёх экранов» — мера удобства, то есть нефункциональное требование о usability."},
  {t:"build",q:"Соберите главную user story проекта из фрагментов.",
   slots:[["Как","клиент барбершопа"],["я хочу","записываться к любимому мастеру онлайн"],["чтобы","не звонить и не ждать ответа администратора"]],
   bank:["клиент барбершопа","записываться к любимому мастеру онлайн","не звонить и не ждать ответа администратора","администратор базы данных","использовать микросервисную архитектуру","всё было на высшем уровне"],
   exp:"Роль — клиент, потребность — онлайн-запись к конкретному мастеру, ценность — экономия времени и нервов. Архитектура — решение команды, не история."},
  {t:"quiz",q:"Бюджет небольшой, требования будут уточняться по ходу, владелец хочет видеть результат каждые две недели. Какую методологию предложить?",
   opts:["Waterfall с полным ТЗ на год вперёд","Scrum: спринты по две недели с демо владельцу","Без методологии — как пойдёт","Сначала полгода писать документацию"],a:1,
   exp:"Меняющиеся требования + желание видеть прогресс = Scrum. Каждые две недели владелец смотрит демо и корректирует приоритеты."},
  {t:"order",q:"Составьте план работы над MVP приложения — расставьте шаги по порядку.",
   items:["Интервью с владельцем и администраторами","Список требований и приоритизация","Прототип экранов записи","Разработка MVP","Тестирование","Запуск в одном филиале"],
   exp:"Сначала понимание и приоритеты, затем дешёвая проверка прототипом, и только потом дорогие этапы — код, тесты, запуск. Пилот в одном филиале снижает риск."},
  {t:"quiz",q:"Разработка стартовала. Кто формулирует критерии приёмки для истории «Онлайн-запись к мастеру»?",
   opts:["Разработчик после написания кода","Аналитик вместе с владельцем продукта — до начала разработки","Тестировщик после релиза","Никто, критерии не нужны"],a:1,
   exp:"Критерии приёмки пишутся до разработки: команда знает, что делает, тестировщик — что проверять, владелец — что принимать. После кода уже поздно."},

const LS="analyst-trainer-v1";
const app=document.getElementById("app");
let S=load();
function load(){try{const d=JSON.parse(localStorage.getItem(LS));if(d&&d.mods)return d}catch(e){}return{mods:{},bestStreak:0}}
function save(){try{localStorage.setItem(LS,JSON.stringify(S))}catch(e){}}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function totalXp(){return Object.values(S.mods).reduce((s,m)=>s+(m.bestXp||0),0)}
function rank(xp){let r=RANKS[0][1];for(const[t,n]of RANKS)if(xp>=t)r=n;return r}
function stars(ratio){return ratio>=.9?3:ratio>=.7?2:ratio>=.5?1:0}
function starStr(n){let s="";for(let i=0;i<3;i++)s+=`<span class="${i<n?"":"off"}">★</span>`;return s}
function hud(){
  document.getElementById("hud-xp").textContent=totalXp();
  document.getElementById("hud-rank").textContent=rank(totalXp());
  document.getElementById("hud-streak").textContent=S.bestStreak;
}
