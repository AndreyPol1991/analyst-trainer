/* -------- Прохождение -------- */
let run=null;
function runMission(m){
  run={m,i:0,correct:0,xp:0,streak:0,mistakes:[]};
  renderTask();
}
function renderTask(){
  hud();
  const {m,i}=run,t=m.tasks[i];
  const head=`
  <div class="miss-head">
    <div class="crumb"><button id="back">← Отложить дело</button> &nbsp;·&nbsp; Дело ${m.num}: ${esc(m.title)}</div>
  </div>
  <div class="task-top">
    <span class="count">Улика ${i+1} / ${m.tasks.length}</span>
    <div class="bar"><i style="width:${i/m.tasks.length*100}%"></i></div>
    <span class="streak">${run.streak>=2?"серия ×"+run.streak:""}</span>
  </div>`;
  app.innerHTML=head+`<div class="tcard" id="tcard">
    <div class="ttype">${TYPE_LABEL[t.t]}</div>
    <p class="tq">${esc(t.q)}</p>
    <div id="tbody"></div>
    <div class="actions" id="tact"></div>
    <div id="tfb"></div>
  </div>`;
  const bb=document.getElementById("back");
  bb.addEventListener("click",()=>{
    if(bb.dataset.arm)showIntro(m);
    else{bb.dataset.arm="1";bb.textContent="← Отложить? Ход расследования не сохранится — нажмите ещё раз"}
  });
  ({quiz:rQuiz,order:rOrder,match:rMatch,sort:rSort,build:rBuild,dialog:rDialog,spot:rSpot,tf:rTf})[t.t](t);
  window.scrollTo(0,0);
}

function finishTask(gained,fullOk,corrText,t,auto){
  run.xp+=gained;
  if(fullOk){run.correct++;run.streak++;if(run.streak>S.bestStreak){S.bestStreak=run.streak;save()}}
  else{run.streak=0;run.mistakes.push({q:t.q,a:corrText,e:t.exp})}
  const fb=document.getElementById("tfb");
  const card=document.getElementById("tcard");
  card.classList.add(fullOk?"ok":"err");
  if(gained>0){
    const fly=document.createElement("span");
    fly.className="fly";fly.textContent="+"+gained+" XP";
    card.appendChild(fly);setTimeout(()=>fly.remove(),1200);
  }
  const adv=()=>{run.i++;if(run.i<run.m.tasks.length)renderTask();else showResults()};
  fb.innerHTML=`<div class="fb ${fullOk?"good":"bad"}">
    <div class="verdict">${fullOk?"Элементарно!":"Ложный след"} <span class="xp mono">+${gained} XP</span></div>
    ${!fullOk&&corrText?`<div class="corr">На самом деле: ${corrText}</div>`:""}
    <p>${esc(t.exp)}</p>
  </div>
  <div class="actions">${auto
    ?`<span id="adv-mark" class="mono" style="font-size:13px;color:var(--muted)">следующее утверждение…</span>`
    :`<button class="btn btn-primary" id="next">${run.i+1<run.m.tasks.length?"Следующая улика →":"К вердикту по делу →"}</button>`}</div>`;
  if(auto){setTimeout(()=>{if(document.getElementById("adv-mark"))adv()},2400)}
  else{
    const nb=document.getElementById("next");
    nb.focus();
    nb.addEventListener("click",adv);
  }
}

/* Кейс-выбор */
function rQuiz(t){
  const body=document.getElementById("tbody");
  body.innerHTML=`<div class="opts">${t.opts.map((o,j)=>`<button class="opt" data-j="${j}">${esc(o)}</button>`).join("")}</div>`;
  body.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
    const j=+b.dataset.j,ok=j===t.a;
    body.querySelectorAll(".opt").forEach(x=>{
      x.disabled=true;
      if(+x.dataset.j===t.a)x.classList.add(ok?"sel-ok":"reveal");
    });
    if(!ok)b.classList.add("sel-bad");
    finishTask(ok?10:0,ok,ok?"":esc(t.opts[t.a]),t);
  }));
}

/* Последовательность */
function rOrder(t){
  const body=document.getElementById("tbody"),act=document.getElementById("tact");
  let bank=shuffle(t.items),seq=[];
  function draw(){
    body.innerHTML=`<div class="seq">${t.items.map((_,j)=>{
      const v=seq[j];
      return `<div class="slot ${v!==undefined?"filled":""}" data-j="${j}"><span class="n mono">${j+1}</span>${v!==undefined?esc(v):'<span style="color:var(--muted)">…</span>'}</div>`}).join("")}</div>
    <div class="zone-label">Нажимайте карточки по порядку</div>
    <div class="chips">${bank.map((x,j)=>`<button class="chip ${seq.includes(x)?"used":""}" data-j="${j}">${esc(x)}</button>`).join("")}</div>`;
    act.innerHTML=`<button class="btn btn-primary" id="sub" ${seq.length===t.items.length?"":"disabled"}>Проверить</button>`;
    body.querySelectorAll(".chip:not(.used)").forEach(c=>c.addEventListener("click",()=>{seq.push(bank[+c.dataset.j]);draw()}));
    body.querySelectorAll(".slot.filled").forEach(s=>s.addEventListener("click",()=>{seq.splice(+s.dataset.j,1);draw()}));
    const sub=document.getElementById("sub");
    if(sub)sub.addEventListener("click",()=>{
      let okN=0;
      body.querySelectorAll(".slot").forEach((s,j)=>{
        const good=seq[j]===t.items[j];if(good)okN++;
        s.classList.add(good?"ok":"bad");
        if(!good)s.insertAdjacentHTML("beforeend",`<span class="fix">→ ${esc(t.items[j])}</span>`);
        s.style.pointerEvents="none";
      });
      body.querySelectorAll(".chip").forEach(c=>c.disabled=true);
      act.innerHTML="";
      const full=okN===t.items.length;
      finishTask(Math.round(10*okN/t.items.length),full,full?"":esc(t.items.join(" → ")),t);
    });
  }
  draw();
}

/* Пары */
function rMatch(t){
  const body=document.getElementById("tbody"),act=document.getElementById("tact");
  const L=t.pairs.map(p=>p[0]),R=shuffle(t.pairs.map(p=>p[1]));
  let selL=null,links={};// links[li]=ri
  const COL=["A","B","C","D","E","F"];
  function draw(){
    body.innerHTML=`<div class="pairs">${L.map((l,li)=>{
      const ri=links[li];
      return `<div class="pairline">
        <button class="pbtn ${selL===li?"active":ri!==undefined?"linked":""}" data-side="l" data-i="${li}">${ri!==undefined?`<span class="tag">${COL[ri]}</span>`:""}${esc(l)}</button>
        <button class="pbtn ${Object.values(links).includes(li)?"":""} ${Object.entries(links).some(([a,b])=>b===li)?"linked":""}" data-side="r" data-i="${li}"><span class="tag">${COL[li]}</span>${esc(R[li])}</button>
      </div>`}).join("")}</div>
      <div class="zone-label">Нажмите элемент слева, затем его пару справа</div>`;
    act.innerHTML=`<button class="btn btn-primary" id="sub" ${Object.keys(links).length===L.length?"":"disabled"}>Проверить</button>`;
    body.querySelectorAll('[data-side="l"]').forEach(b=>b.addEventListener("click",()=>{
      const i=+b.dataset.i;
      if(links[i]!==undefined){delete links[i];selL=null}else selL=selL===i?null:i;
      draw();
    }));
    body.querySelectorAll('[data-side="r"]').forEach(b=>b.addEventListener("click",()=>{
      if(selL===null)return;
      const ri=+b.dataset.i;
      for(const k in links)if(links[k]===ri)delete links[k];
      links[selL]=ri;selL=null;draw();
    }));
    const sub=document.getElementById("sub");
    if(sub)sub.addEventListener("click",()=>{
      let okN=0;
      body.querySelectorAll('[data-side="l"]').forEach(b=>{
        const li=+b.dataset.i,ri=links[li];
        const good=R[ri]===t.pairs[li][1];if(good)okN++;
        b.classList.add(good?"ok":"bad");
        if(!good)b.insertAdjacentHTML("beforeend",`<div style="font-size:12.5px;color:var(--muted);margin-top:4px">→ ${esc(t.pairs[li][1])}</div>`);
      });
      body.querySelectorAll(".pbtn").forEach(x=>{x.disabled=true;x.style.pointerEvents="none"});
      act.innerHTML="";
      const full=okN===L.length;
      finishTask(Math.round(10*okN/L.length),full,full?"":t.pairs.map(p=>`${esc(p[0])} — ${esc(p[1])}`).join("; "),t);
    });
  }
  draw();
}

/* Сортировка */
function rSort(t){
  const body=document.getElementById("tbody");
  const items=shuffle(t.items);
  let idx=0,okN=0;
  function draw(){
    if(idx>=items.length){
      body.innerHTML=`<div class="sort-note">Разобрано: ${okN} из ${items.length}</div>`;
      const full=okN===items.length;
      finishTask(Math.round(10*okN/items.length),full,full?"":t.items.map(x=>`${esc(x[0])} — ${esc(t.buckets[x[1]])}`).join("; "),t);
      return;
    }
    const it=items[idx];
    body.innerHTML=`
      <div class="sort-item" id="si">${esc(it[0])}</div>
      <div class="bucket-row">${t.buckets.map((b,j)=>`<button class="bucket" data-j="${j}">${esc(b)}</button>`).join("")}</div>
      <div class="sort-note">Карточка ${idx+1} из ${items.length} · верно: ${okN}</div>`;
    body.querySelectorAll(".bucket").forEach(b=>b.addEventListener("click",()=>{
      const good=+b.dataset.j===it[1];
      if(good)okN++;
      const si=document.getElementById("si");
      si.classList.add(good?"ok":"bad");
      if(!good)si.insertAdjacentHTML("beforeend",`<div style="font-size:13px;font-weight:400;color:var(--muted);margin-top:6px">Это: ${esc(t.buckets[it[1]])}</div>`);
      body.querySelectorAll(".bucket").forEach(x=>x.disabled=true);
      setTimeout(()=>{idx++;draw()},good?550:1600);
    }));
  }
  draw();
}

/* Конструктор истории */
function rBuild(t){
  const body=document.getElementById("tbody"),act=document.getElementById("tact");
  const bank=shuffle(t.bank);
  let fill=t.slots.map(()=>null);
  function draw(){
    body.innerHTML=`<div class="build-sent">${t.slots.map((s,j)=>`
      <div class="bslot"><span class="pre">${esc(s[0])}</span>
        <div class="cell ${fill[j]?"filled":""}" data-j="${j}">${fill[j]?esc(fill[j]):'<span style="color:var(--muted)">выберите фрагмент…</span>'}</div>
      </div>`).join("")}</div>
    <div class="zone-label">Фрагменты (есть лишние!)</div>
    <div class="chips">${bank.map((x,j)=>`<button class="chip ${fill.includes(x)?"used":""}" data-j="${j}">${esc(x)}</button>`).join("")}</div>`;
    act.innerHTML=`<button class="btn btn-primary" id="sub" ${fill.every(x=>x)?"":"disabled"}>Проверить историю</button>`;
    body.querySelectorAll(".chip:not(.used)").forEach(c=>c.addEventListener("click",()=>{
      const k=fill.indexOf(null);if(k===-1)return;
      fill[k]=bank[+c.dataset.j];draw();
    }));
    body.querySelectorAll(".cell.filled").forEach(c=>c.addEventListener("click",()=>{fill[+c.dataset.j]=null;draw()}));
    const sub=document.getElementById("sub");
    if(sub)sub.addEventListener("click",()=>{
      let okN=0;
      body.querySelectorAll(".cell").forEach(c=>{
        const j=+c.dataset.j,good=fill[j]===t.slots[j][1];
        if(good)okN++;
        c.classList.add(good?"ok":"bad");
        if(!good)c.insertAdjacentHTML("beforeend",`<span style="font-size:12.5px;color:var(--muted);margin-left:8px">→ ${esc(t.slots[j][1])}</span>`);
        c.style.pointerEvents="none";
      });
      body.querySelectorAll(".chip").forEach(x=>x.disabled=true);
      act.innerHTML="";
      const full=okN===t.slots.length;
      finishTask(Math.round(10*okN/t.slots.length),full,full?"":esc(t.slots.map(s=>`${s[0]} ${s[1]}`).join(", ")),t);
    });
  }
  draw();
}

/* Диалог со стейкхолдером */
function rDialog(t){
  const body=document.getElementById("tbody");
  body.innerHTML=`<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">Свидетель по делу: <b style="color:var(--ink)">${esc(t.who)}</b></div>
    <div class="chat" id="chat"></div><div id="dopts" style="margin-top:14px"></div>`;
  const chat=document.getElementById("chat"),dopts=document.getElementById("dopts");
  let k=0,okN=0;
  function bub(cls,html,withAv){
    const d=document.createElement("div");d.className="msg "+cls;
    d.innerHTML=(withAv?`<div class="av">${esc(t.init)}</div>`:"")+`<div class="bub">${html}</div>`;
    chat.appendChild(d);d.scrollIntoView({block:"nearest"});return d;
  }
  function step(){
    if(k>=t.steps.length){
      const full=okN===t.steps.length;
      finishTask(Math.round(10*okN/t.steps.length),full,full?"":t.steps.map(s=>esc(s.opts[s.a])).join(" · "),t);
      return;
    }
    const s=t.steps[k];
    const d=bub("them",'<span class="dots"><i></i><i></i><i></i></span>',true);
    setTimeout(()=>{
      if(!document.getElementById("chat"))return;
      d.querySelector(".bub").textContent=s.say;
      dopts.innerHTML=`<div class="zone-label">Ваша реплика</div><div class="opts">${s.opts.map((o,j)=>`<button class="opt" data-j="${j}">${esc(o)}</button>`).join("")}</div>`;
      dopts.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
        const j=+b.dataset.j,good=j===s.a;
        dopts.innerHTML="";
        bub("me",esc(s.opts[j]));
        if(good)okN++;
        else bub("coach",`<b>Холмс:</b> ${esc(s.exp)} Сильнее прозвучало бы: «${esc(s.opts[s.a])}»`);
        k++;setTimeout(step,good?500:1300);
      }));
    },900);
  }
  step();
}

  }));
}

/* Блиц: правда или миф, 8 секунд */
let tfTimer=null;
function rTf(t){
  clearTimeout(tfTimer);
  const body=document.getElementById("tbody");
  body.innerHTML=`<div class="tbar"><i id="tmr"></i></div>
  <div class="tf-row"><button class="btn btn-ghost" id="tfT">Правда</button><button class="btn btn-ghost" id="tfF">Миф</button></div>`;
  const bar=document.getElementById("tmr");
  let done=false;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{bar.style.transition="width 8s linear";bar.style.width="0%"}));
  tfTimer=setTimeout(()=>ans(null),8100);
  function ans(v){
    if(done||!document.getElementById("tmr"))return;
    done=true;clearTimeout(tfTimer);
    bar.style.transition="none";
    document.getElementById("tfT").disabled=true;
    document.getElementById("tfF").disabled=true;
    const ok=v===t.v;
    finishTask(ok?5:0,ok,ok?"":(t.v?"Правда":"Миф")+(v===null?" (время вышло!)":""),t,true);
  }
  document.getElementById("tfT").addEventListener("click",()=>ans(true));
  document.getElementById("tfF").addEventListener("click",()=>ans(false));
}

  window.scrollTo(0,0);
  if(st>=2&&!(window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches))confetti();
}

function confetti(){
  const c=document.createElement("canvas");c.id="confetti";document.body.appendChild(c);
  const x=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;
  const cs=getComputedStyle(document.documentElement);
  const cols=["--accent","--teal","--good","--bad"].map(v=>cs.getPropertyValue(v).trim());
  const P=Array.from({length:140},()=>({
    x:Math.random()*c.width, y:-20-Math.random()*c.height*.5,
    vy:2.2+Math.random()*3, vx:(Math.random()-.5)*1.6,
    r:3+Math.random()*4, a:Math.random()*6.3, va:(Math.random()-.5)*.25,
    col:cols[Math.floor(Math.random()*cols.length)]
  }));
  let f=0;
  (function tick(){
    x.clearRect(0,0,c.width,c.height);
    for(const p of P){
      p.y+=p.vy;p.x+=p.vx;p.a+=p.va;
      x.save();x.translate(p.x,p.y);x.rotate(p.a);
      x.fillStyle=p.col;x.fillRect(-p.r,-p.r/2,p.r*2,p.r);x.restore();
    }
    if(++f<170)requestAnimationFrame(tick);else c.remove();
  })();
}

showHub();
